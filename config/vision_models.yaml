# Vision Models Reference
# ======================
# Catalog of vision-capable models across providers for benchmarking
# The 'id' field is the exact string to send to the API
# Aligned with brite-skills/vision_models.yaml (source of truth)
# Last Updated: 2026-06-05

providers:
  google:
    name: "Google (Gemini)"
    env_key: "GOOGLE_API_KEY"
    models:
      # Gemini 3 Series (Preview)
      - id: "gemini-3-pro-preview"
        name: "Gemini 3 Pro Preview"
        tier: "frontier"
        speed: "medium"
        context_window: 1000000
        vision: true
        status: "active"
        notes: "Cutting-edge multimodal understanding"
        cost_per_1m_input: 2.00
        cost_per_1m_output: 12.00

      - id: "gemini-3-flash-preview"
        name: "Gemini 3 Flash Preview"
        tier: "standard"
        speed: "fast"
        context_window: 1000000
        vision: true
        status: "active"
        notes: "Fast/cheap - good for OCR tasks"
        cost_per_1m_input: 0.50
        cost_per_1m_output: 3.00

      # Gemini 2.5 Series
      - id: "gemini-2.5-pro"
        name: "Gemini 2.5 Pro"
        tier: "frontier"
        speed: "medium"
        context_window: 1000000
        vision: true
        status: "active"
        notes: "Deep reasoning capabilities"
        cost_per_1m_input: 0.625
        cost_per_1m_output: 5.00

      - id: "gemini-2.5-flash"
        name: "Gemini 2.5 Flash"
        tier: "standard"
        speed: "fast"
        context_window: 1000000
        vision: true
        status: "active"
        notes: "Balanced performance - default for web search grounding"
        cost_per_1m_input: 0.30
        cost_per_1m_output: 2.50

      # Gemini 2.0 Series - deprecated (shutdown 2026-03-31)
      - id: "gemini-2.0-flash"
        name: "Gemini 2.0 Flash"
        tier: "standard"
        speed: "fast"
        context_window: 1000000
        vision: true
        status: "deprecated"
        replaced_by: "gemini-2.5-flash"
        notes: "Shutdown announced for 2026-03-31; use 2.5 Flash"
        cost_per_1m_input: 0.10
        cost_per_1m_output: 0.40

      - id: "gemini-2.0-flash-lite"
        name: "Gemini 2.0 Flash Lite"
        tier: "economy"
        speed: "fastest"
        context_window: 1000000
        vision: true
        status: "deprecated"
        replaced_by: "gemini-2.5-flash"
        notes: "Shutdown announced for 2026-03-31; use 2.5 Flash"
        cost_per_1m_input: 0.075
        cost_per_1m_output: 0.30

  openai:
    name: "OpenAI"
    env_key: "OPENAI_API_KEY"
    models:
      # GPT-5.5 Series - frontier (research/analysis)
      - id: "gpt-5.5"
        name: "GPT-5.5"
        tier: "frontier"
        speed: "medium"
        context_window: 1050000
        max_output: 128000
        vision: true
        status: "active"
        notes: "Latest frontier model. Uses max_completion_tokens"
        cost_per_1m_input: 5.00
        cost_per_1m_output: 30.00

      # GPT-5 Mini - Economy variant
      - id: "gpt-5-mini"
        name: "GPT-5 Mini"
        tier: "economy"
        speed: "fast"
        context_window: 400000
        max_output: 128000
        vision: true
        status: "active"
        notes: "Cost-efficient GPT-5. Uses max_completion_tokens"
        cost_per_1m_input: 0.25
        cost_per_1m_output: 2.00

      # GPT-4.1 Series
      - id: "gpt-4.1"
        name: "GPT-4.1"
        tier: "standard"
        speed: "medium"
        context_window: 1047576
        vision: true
        status: "active"
        notes: "1M context vision model, fine-tunable"
        cost_per_1m_input: 2.00
        cost_per_1m_output: 8.00

      - id: "gpt-4.1-mini"
        name: "GPT-4.1 Mini"
        tier: "standard"
        speed: "fast"
        context_window: 1047576
        vision: true
        status: "active"
        notes: "Efficient mid-tier model"
        cost_per_1m_input: 0.40
        cost_per_1m_output: 1.60

      - id: "gpt-4.1-nano"
        name: "GPT-4.1 Nano"
        tier: "economy"
        speed: "fastest"
        context_window: 1047576
        vision: true
        status: "active"
        notes: "Ultra-fast, cost-efficient"
        cost_per_1m_input: 0.10
        cost_per_1m_output: 0.40

      # GPT-4o Series
      - id: "gpt-4o"
        name: "GPT-4o"
        tier: "standard"
        speed: "fast"
        context_window: 128000
        vision: true
        status: "active"
        notes: "Omni model - text, audio, image, video. Used for web search (Responses API)"
        cost_per_1m_input: 2.50
        cost_per_1m_output: 10.00

      - id: "gpt-4o-mini"
        name: "GPT-4o Mini"
        tier: "economy"
        speed: "fast"
        context_window: 128000
        vision: true
        status: "active"
        notes: "Cheap, great for focused tasks - default for content/prompt generation"
        cost_per_1m_input: 0.15
        cost_per_1m_output: 0.60

      # Image generation
      - id: "gpt-image-2"
        name: "GPT Image 2"
        tier: "frontier"
        speed: "medium"
        image_generation: true
        status: "active"
        notes: "OpenAI image generation. ~$0.01 (low) / ~$0.06 (medium) / ~$0.22 (high) per image at 1024-based sizes. Returns base64 PNG."
        cost_per_1m_input: 8.00
        cost_per_1m_output: 30.00

  anthropic:
    name: "Anthropic (Claude)"
    env_key: "ANTHROPIC_API_KEY"
    models:
      # Claude 4.8 Series - frontier (newsletter writing)
      - id: "claude-opus-4-8"
        name: "Claude Opus 4.8"
        tier: "frontier"
        speed: "slow"
        context_window: 1000000
        max_output: 128000
        vision: true
        status: "active"
        notes: "Most capable Claude - best vision/reasoning/writing"
        cost_per_1m_input: 5.00
        cost_per_1m_output: 25.00

      # Claude Sonnet 4.6 - standard
      - id: "claude-sonnet-4-6"
        name: "Claude Sonnet 4.6"
        tier: "standard"
        speed: "medium"
        context_window: 200000
        max_output: 64000
        vision: true
        status: "active"
        notes: "Balanced capability and speed, near-Opus performance"
        cost_per_1m_input: 3.00
        cost_per_1m_output: 15.00

      # Claude Haiku 4.5 - economy
      - id: "claude-haiku-4-5-20251001"
        name: "Claude Haiku 4.5"
        tier: "economy"
        speed: "fastest"
        context_window: 200000
        vision: true
        status: "active"
        notes: "Fast and affordable"
        cost_per_1m_input: 1.00
        cost_per_1m_output: 5.00

# Benchmark Test Groups
# Define model groups for A/B testing
benchmark_groups:
  # Economy tier - cheapest models for high-volume tasks
  economy_tier:
    description: "Cheapest models for high-volume tasks"
    models:
      - "gemini-2.5-flash"
      - "gpt-4o-mini"
      - "claude-haiku-4-5-20251001"

  # Standard tier - balanced cost/performance
  standard_tier:
    description: "Balanced cost/performance models"
    models:
      - "gemini-2.5-flash"
      - "gpt-4o"
      - "claude-sonnet-4-6"

  # Frontier tier - highest capability
  frontier_tier:
    description: "Highest capability models"
    models:
      - "gpt-5.5"
      - "claude-opus-4-8"
      - "gemini-3-pro-preview"

  # OpenAI comparison - all tiers
  openai_versions:
    description: "Compare OpenAI model generations"
    models:
      - "gpt-5.5"
      - "gpt-5-mini"
      - "gpt-4.1"
      - "gpt-4o"
      - "gpt-4o-mini"

  # OpenAI economy options
  openai_economy:
    description: "Compare OpenAI economy models"
    models:
      - "gpt-5-mini"
      - "gpt-4.1-nano"
      - "gpt-4o-mini"

  # Claude comparison
  claude_versions:
    description: "Compare Claude model tiers"
    models:
      - "claude-opus-4-8"
      - "claude-sonnet-4-6"
      - "claude-haiku-4-5-20251001"

  # Gemini comparison - all versions
  gemini_versions:
    description: "Compare Gemini model generations"
    models:
      - "gemini-3-pro-preview"
      - "gemini-3-flash-preview"
      - "gemini-2.5-pro"
      - "gemini-2.5-flash"

  # Default for classification benchmarks
  classification_default:
    description: "Recommended models for document classification"
    models:
      - "gemini-2.5-flash"        # Fast, cheap, good vision
      - "claude-sonnet-4-6"       # Strong reasoning
      - "gpt-4o-mini"             # Cost-effective

  # Full cross-provider comparison
  full_comparison:
    description: "All active models across providers"
    models:
      # Frontier
      - "gpt-5.5"
      - "claude-opus-4-8"
      - "gemini-3-pro-preview"
      # Standard
      - "gpt-4o"
      - "claude-sonnet-4-6"
      - "gemini-2.5-flash"
      # Economy
      - "gpt-4o-mini"
      - "claude-haiku-4-5-20251001"

# Sources:
# - brite-skills/vision_models.yaml (source of truth)
# - Google Gemini: https://ai.google.dev/gemini-api/docs/models
# - OpenAI: https://platform.openai.com/docs/models
# - Anthropic: https://platform.claude.com/docs/en/about-claude/models/overview

# =============================================================================
# TASK ASSIGNMENTS
# =============================================================================
# Maps application tasks to specific models
# Each task has: model (primary), fallback, tier, and optional alternatives

task_assignments:
  # Research & Analysis Tasks
  research_enrichment:
    description: "GPT-5.5 analysis layer for Perplexity/Insight Builder/Source Explorer"
    model: "gpt-5.5"
    fallback: "gpt-4.1"
    tier: "frontier"
    economy_alternative: "gpt-4o-mini"
    notes: "Uses max_completion_tokens parameter"

  # Content Generation Tasks
  content_generation:
    description: "Newsletter article writing (News, Tip, Trend sections)"
    model: "gpt-4o-mini"
    fallback: "claude-haiku-4-5-20251001"
    tier: "economy"
    standard_alternative: "gpt-4o"
    frontier_alternative: "claude-opus-4-8"
    notes: "Cost-effective for high-volume content generation"

  # Brand & Quality Checks
  brand_guidelines_check:
    description: "Check content against brand voice guidelines"
    model: "gpt-4o-mini"
    fallback: "claude-haiku-4-5-20251001"
    tier: "economy"
    notes: "Fast validation, doesn't need frontier capabilities"

  # Image Analysis (for meme review, etc.)
  image_analysis:
    description: "Analyze images for content appropriateness"
    model: "gpt-4o"
    fallback: "gemini-2.5-flash"
    tier: "standard"
    economy_alternative: "gpt-4o-mini"
    notes: "Needs vision capabilities"

  # Image Generation Prompts
  image_prompt_generation:
    description: "Generate prompts for image creation"
    model: "gpt-4o-mini"
    fallback: "claude-haiku-4-5-20251001"
    tier: "economy"
    notes: "Creative but cost-efficient"

  # Subject Line Generation
  subject_line_generation:
    description: "Generate email subject lines and preheaders"
    model: "gpt-4o-mini"
    fallback: "claude-haiku-4-5-20251001"
    tier: "economy"
    notes: "Short outputs, economy tier sufficient"

  # Meme / Newsletter Image Generation
  meme_generation:
    description: "Generate meme and newsletter images"
    model: "gpt-image-2"
    fallback: "gemini-2.5-flash-image"
    tier: "frontier"
    notes: "OpenAI gpt-image-2 (medium quality) for image generation"
